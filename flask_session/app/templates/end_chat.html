<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank You</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url('{{ url_for("static", filename="images/bg3.jpg") }}');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      margin: 0;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    h2, p, blockquote {
      text-shadow: 1px 1px 5px #000;
    }
    .btn {
      margin: 10px;
    }
    blockquote {
      font-style: italic;
      margin: 20px auto;
      font-size: 1.3rem;
      max-width: 600px;
    }
    #chatHistory {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      max-height: 250px;
      overflow-y: auto;
      width: 90%;
      max-width: 600px;
      color: #fff;
      text-align: left;
    }
    .chat-message {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
    }
    .user {
      background-color: #198754;
    }
    .bot {
      background-color: #dc3545;
    }
    small {
      display: block;
      margin-top: 5px;
      font-size: 0.8rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h2>Thank You for Sharing 💙</h2>
  <p>You're doing great. Remember, every small step matters. 🌟</p>
  <blockquote>"{{ quote }}"</blockquote>

  <div class="mt-4">
    <!--<button class="btn btn-info" onclick="loadChatHistory()">📜 View Chat History</button>-->
    <button class="btn btn-danger" onclick="deleteChatHistory()">🗑️ Delete Chat History</button>
    <a href="/chat" class="btn btn-secondary">ChatHistory</a>
    <a href="{{ url_for('login') }}" class="btn btn-warning">🚪 Logout</a>
  </div>

  <!-- Chat History Display -->
  <div id="chatHistory"></div>

  <script>
    function loadChatHistory() {
      fetch('/chat_history_json', {
        method: 'GET',
        headers: {
          'X-Requested-With': 'XMLHttpRequest'
        },
        credentials: 'same-origin'
      })
      .then(response => {
        if (response.status === 401) throw new Error('Not logged in.');
        if (!response.ok) throw new Error('Failed to fetch chat history.');
        return response.json();
      })
      .then(data => {
        const historyContainer = document.getElementById('chatHistory');
        historyContainer.innerHTML = '';
        if (data.length === 0) {
          historyContainer.innerHTML = '<p>No chat history found.</p>';
        } else {
          data.forEach(item => {
            const div = document.createElement('div');
            div.classList.add('chat-message', item.role === 'user' ? 'user' : 'bot');
            div.innerHTML = `
              <strong>${item.role.toUpperCase()}:</strong> ${item.message}
              <small>${item.timestamp}</small>
            `;
            historyContainer.appendChild(div);
          });
        }
      })
      .catch(err => {
        document.getElementById('chatHistory').innerHTML = `<p style="color:red;">${err.message}</p>`;
      });
    }

    function deleteChatHistory() {
      if (!confirm("Are you sure you want to delete your chat history?")) return;

      fetch('/delete_chat_history', {
        method: 'POST',
        headers: {
          'X-Requested-With': 'XMLHttpRequest',
          'Content-Type': 'application/json'
        },
        credentials: 'same-origin'
      })
      .then(response => {
        if (!response.ok) throw new Error('Failed to delete chat history.');
        document.getElementById('chatHistory').innerHTML = '<p>Chat history deleted successfully.</p>';
      })
      .catch(err => {
        document.getElementById('chatHistory').innerHTML = `<p style="color:red;">${err.message}</p>`;
      });
    }
  </script>
</body>
</html>
