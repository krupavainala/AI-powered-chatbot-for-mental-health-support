<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mental Health Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url("{{ url_for('static', filename='images/chat.jpg') }}");
      background-size: cover;
      background-position: center;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    .chat-container {
      background-color: rgba(255, 255, 255, 0.9);
      width: 90%;
      max-width: 600px;
      height: 80vh;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #chatBox {
      flex-grow: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.4;
    }
    .user-message {
      background-color: #d1e7dd;
      align-self: flex-end;
      text-align: right;
    }
    .bot-message {
      background-color: #f8d7da;
      align-self: flex-start;
    }
    #musicSection iframe {
      border-radius: 12px;
      width: 100%;
      height: 380px;
      border: none;
      margin-top: 10px;
    }
    .input-area {
      display: flex;
      padding: 15px 20px;
      border-top: 1px solid #ddd;
      gap: 10px;
      background: white;
    }
    .input-area input[type="text"] {
      flex-grow: 1;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }
    .input-area button {
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background-color: #0d6efd;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }
    .btn-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px auto;
    }
    #loading-spinner {
      display: none;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border-left-color: #09f;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="chat-container" role="main" aria-label="Mental health chatbot">
    <div id="chatBox" aria-live="polite" aria-relevant="additions" tabindex="0">
      <div class="message bot-message" aria-live="assertive" aria-atomic="true">
        Hello {{ username }}, I'm here for you. How are you feeling today?
      </div>
    </div>

    <div id="musicSection" aria-label="Music recommendations"></div>

    <div id="loading-spinner" role="status" aria-live="polite" aria-hidden="true">
      <div class="spinner"></div>
      <span class="visually-hidden">Loading...</span>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" aria-label="Type your message" />
      <button id="sendButton" title="Send" aria-label="Send message">➤</button>
      <button id="micButton" title="Speak" aria-label="Speak your message">🎤</button>
    </div>

    <div class="btn-row">
      <a href="{{ url_for('end_chat') }}" class="btn btn-success" role="button" aria-label="End chat">🔚 End Chat</a>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("userInput");
    const spinner = document.getElementById("loading-spinner");
    const sendButton = document.getElementById("sendButton");
    const micButton = document.getElementById("micButton");
    const musicSection = document.getElementById("musicSection");

    function cleanBotResponse(response) {
      if (!response) return "";
      if (typeof response !== "string") response = String(response);
      if (response.toLowerCase().startsWith("assistant:")) return response.slice(10).trim();
      return response.trim();
    }

    function linkify(text) {
      const urlPattern = /(\bhttps?:\/\/[^\s]+)/g;
      return text.replace(urlPattern, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function appendMessage(sender, text, timestamp = null) {
      const msgDiv = document.createElement("div");
      msgDiv.className = "message " + (sender === "user" ? "user-message" : "bot-message");
      let content = sender === "bot" ? linkify(text).replace(/\n/g, "<br>") : `<span>${text}</span>`;
      if (timestamp) {
        content += `<br/><small class="text-muted">${timestamp}</small>`;
      }
      msgDiv.innerHTML = content;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speakBotResponse(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const calmVoice = voices.find(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('zira')));
        if (calmVoice) utterance.voice = calmVoice;
        utterance.rate = 0.9;
        utterance.pitch = 1.2;
        utterance.volume = 1;
        speechSynthesis.speak(utterance);
      }
    }

    async function loadChatHistory() {
      try {
        const response = await fetch('/chat_history_json', { credentials: 'include' });
        if (!response.ok) {
          throw new Error('Failed to load chat history');
        }
        const data = await response.json();
        console.log("Loaded chat history:", data);
        console.log("Type of data.messages:", typeof data.messages);
        console.log("Is data.messages array?:", Array.isArray(data.messages));

        // Remove all messages except the initial welcome
        while (chatBox.children.length > 1) {
          chatBox.removeChild(chatBox.lastChild);
        }

        // Append each chat message from history
        if (data.messages && Array.isArray(data.messages) && data.messages.length > 0) {
          data.messages.forEach(item => {
            appendMessage(item.role, item.message, item.timestamp);
          });
        } else if (Array.isArray(data) && data.length > 0) {
          data.forEach(item => {
            appendMessage(item.role, item.message, item.timestamp);
          });
        }else {
          console.log("No chat history messages found");
        }
             
       
      } catch (error) {
        console.error('Error loading chat history:', error);
      }
    }

    async function sendMessage(userMessage) {
      spinner.style.display = "flex";
      spinner.setAttribute("aria-hidden", "false");
      input.disabled = true;
      sendButton.disabled = true;
      micButton.disabled = true;

      appendMessage("user", userMessage);
      musicSection.innerHTML = "";

      try {
        const response = await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ message: userMessage })
        });

        if (!response.ok) {
          if (response.status === 401) {
            alert("Session expired. Please log in again.");
            window.location.href = "/login";
            return;
          }
          throw new Error("Server error: " + response.statusText);
        }

        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          const data = await response.json();
          const botText = cleanBotResponse(data.response);
          appendMessage("bot", botText);
          speakBotResponse(botText);

          const lower = botText.toLowerCase();
          if (lower.includes("calm music") || lower.includes("relaxing music") || lower.includes("soothing songs")) {
            musicSection.innerHTML = `
              <iframe
                src="https://open.spotify.com/embed/playlist/5LWAFfebSzZT7XzaOmN2lX"
                allow="encrypted-media"
                allowfullscreen
                loading="lazy"
                title="Calm Music Playlist">
              </iframe>`;
            musicSection.scrollIntoView({ behavior: "smooth" });
          }
        } else {
          const text = await response.text();
          console.error("Expected JSON but got:", text);
          alert("Unexpected response from server. Please log in again.");
          window.location.href = "/login";
          return;
        }
      } catch (error) {
        appendMessage("bot", "Error communicating with the server.");
        console.error(error);
      } finally {
        spinner.style.display = "none";
        spinner.setAttribute("aria-hidden", "true");
        input.disabled = false;
        sendButton.disabled = false;
        micButton.disabled = false;
        input.value = "";
        input.focus();
      }
    }

    async function endChat() {
      try {
        const response = await fetch('/end_chat', {
          method: 'POST',
          credentials: 'include',
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        if (response.ok) {
          window.location.href = "/thank_you";
        } else {
          alert('Failed to end chat');
        }
      } catch (error) {
        console.error(error);
        alert('Error ending chat');
      }
    }

    document.querySelector('.btn-success').addEventListener('click', e => {
      e.preventDefault();
      endChat();
    });

    sendButton.addEventListener("click", () => {
      const msg = input.value.trim();
      if (msg) sendMessage(msg);
    });

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        const msg = input.value.trim();
        if (msg) sendMessage(msg);
      }
    });

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';

      micButton.addEventListener("click", () => {
        recognition.start();
      });

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        input.value = transcript;
        sendMessage(transcript);
      };
    }

    window.addEventListener('load', loadChatHistory);
  </script>
</body>
</html>
