<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Emergency Alerts</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('{{ url_for('static', filename='images/login.jpg') }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
    }
    .content {
      background-color: rgba(255, 255, 255, 0.85);
      padding: 20px 30px;
      margin: 40px auto;
      max-width: 900px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    .alert {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }
    .timestamp {
      font-size: 0.85em;
      color: #666;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-top: 10px;
      padding: 10px;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="content">
    <h2>Emergency Alerts</h2>

    {% for alert in emergency_alerts %}
      <div class="alert">
        <p><strong>{{ alert.username }}</strong>:</p>
        <p>{{ alert.message }}</p>
        <p class="timestamp">{{ alert.timestamp }}</p>

        <!-- Reply form for each alert -->
        <form method="POST" action="{{ url_for('admin_reply') }}">
          <input type="hidden" name="username" value="{{ alert.username }}">
          <textarea name="reply_message" placeholder="Type your reply" required></textarea>
          <button type="submit">Send Reply</button>
        </form>
      </div>
    {% else %}
      <p>No emergency alerts at this time.</p>
    {% endfor %}
  </div>
</body>
</html>
