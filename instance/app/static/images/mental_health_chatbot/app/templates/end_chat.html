<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url("{{ url_for('static', filename=background) }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      margin: 0;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h2, p, blockquote {
      text-shadow: 1px 1px 5px #000;
    }

    .btn {
      margin: 10px;
    }

    blockquote {
      font-style: italic;
      margin: 20px auto;
      font-size: 1.3rem;
      max-width: 600px;
    }
     #chatHistory {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      width: 90%;
      max-width: 600px;
    }

    .message {
      margin-bottom: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
    <h2>Thank You for Sharing 💙</h2>
    <p>You're doing great. Remember, every small step matters. 🌟</p>
    <blockquote>
      "{{ quote }}"
    </blockquote>

    <div class="mt-4">
      <a href="/chat_history" class="btn btn-info">📜 View Chat History</a>

      <form method="POST" action="/delete_history" style="display:inline;">
        <button type="submit" class="btn btn-danger">🗑️ Delete Chat History</button>
      </form>

      <a href="/chat" class="btn btn-secondary">⬅️ Back to Chat</a>
      <a href="/logout" class="btn btn-warning">🚪 Logout</a>
    </div>
<div id="chatHistory" style="display: none;"></div>

  <!-- JavaScript for AJAX -->
  <script>
    function viewHistory() {
      fetch('/get_chat_history')
        .then(response => response.json())
        .then(data => {
          const container = document.getElementById('chatHistory');
          if (data.length === 0) {
            container.innerHTML = "<em>No chat history found.</em>";
          } else {
            container.innerHTML = "";
            data.forEach(msg => {
              const div = document.createElement('div');
              div.className = 'message';
              div.innerHTML = `<strong>${msg.sender}:</strong> ${msg.message} <small>(${msg.timestamp})</small>`;
              container.appendChild(div);
            });
          }
          container.style.display = 'block';
        });
    }

    function deleteHistory() {
      fetch('/delete_history', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
          document.getElementById('chatHistory').innerHTML = "<em>Chat history deleted.</em>";
          document.getElementById('chatHistory').style.display = 'block';
        });
    }
  </script>

</body>
</html>
