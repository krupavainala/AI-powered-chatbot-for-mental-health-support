<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Chat History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px;
      background-image: url('{{ url_for("static", filename="images/chat_bg.jpg") }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      min-height: 100vh;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    }

    .chat-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      overflow-y: auto;
      max-height: 400px;
    }

    .user, .bot {
      margin-bottom: 12px;
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .user {
      background-color: #DCF8C6;
      align-self: flex-end;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background-color: #EAEAEA;
      align-self: flex-start;
      margin-right: auto;
      text-align: left;
    }

    .timestamp {
      font-size: 0.75em;
      color: #666;
      margin-top: 4px;
    }

    a.back-link, button.delete-btn {
      display: inline-block;
      margin-right: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    a.back-link {
      background-color: #007BFF;
      color: white;
    }

    a.back-link:hover {
      background-color: #0056b3;
    }

    button.delete-btn {
      background-color: #dc3545;
      color: white;
    }

    button.delete-btn:hover {
      background-color: #a71d2a;
    }

    .button-container {
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 640px) {
      .button-container {
        flex-direction: column;
        gap: 10px;
      }

      a.back-link, button.delete-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <h2>Chat History for {{ session['username'] }}</h2>

  <div class="button-container">
    <a href="{{ url_for('chat') }}" class="back-link">← Back to Chat</a>
    <button class="delete-btn" onclick="deleteChatHistory()">🗑 Delete Chat History</button>
  </div>

  <div class="chat-box chat-container">
    {% if messages %}
      {% for sender, message, timestamp in messages %}
        <div class="{{ sender }}">
          <strong>{{ sender.capitalize() }}:</strong> {{ message }}
          <div class="timestamp">{{ timestamp }}</div>
        </div>
      {% endfor %}
    {% else %}
      <p>No chat history found.</p>
    {% endif %}
  </div>

  <script>
    function deleteChatHistory() {
      if (!confirm('Are you sure you want to delete your chat history? This action cannot be undone.')) {
        return;
      }

      fetch('/delete_chat_history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message || 'Chat history deleted.');
        window.location.reload();
      })
      .catch(error => {
        alert('Error deleting chat history.');
        console.error('Error:', error);
      });
    }
  </script>

</body>
</html>
