<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mental Health Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    body {
      background-image: url("{{ url_for('static', filename='images/chat.jpg') }}");
      background-size: cover;
      background-position: center;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .chat-container {
      background-color: rgba(255, 255, 255, 0.9);
      width: 90%;
      max-width: 600px;
      height: 80vh;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #chatBox {
      flex-grow: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .user-message {
      background-color: #d1e7dd;
      align-self: flex-end;
      text-align: right;
    }

    .bot-message {
      background-color: #f8d7da;
      align-self: flex-start;
    }

    #musicSection iframe {
      border-radius: 12px;
      width: 100%;
      height: 380px;
      border: none;
      margin-top: 10px;
    }

    .input-area {
      display: flex;
      padding: 15px 20px;
      border-top: 1px solid #ddd;
      gap: 10px;
      background: white;
    }

    .input-area input[type="text"] {
      flex-grow: 1;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-area button {
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background-color: #0d6efd;
      color: white;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px auto;
    }

    #loading-spinner {
      display: none;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
    }

    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border-left-color: #09f;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div id="chatBox">
      <div class="message bot-message">
        Hello {{ username }}, I'm here for you. How are you feeling today?
        <div id="musicSection"></div>
      </div>

      {% for chat in chat_history %}
        <div class="message {{ 'user-message' if chat.sender == 'user' else 'bot-message' }}">
          <span>{{ chat.message }}</span><br/>
          <small class="text-muted">{{ chat.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</small>
        </div>
      {% endfor %}
    </div>

    <div id="loading-spinner"><div class="spinner"></div></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
      <button id="sendButton" title="Send">➤</button>
      <button id="micButton" title="Speak">🎤</button>
    </div>

    <div class="btn-row">
      <a href="{{ url_for('end_chat') }}" class="btn btn-success">🔚 End Chat</a>
    </div>
  </div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("userInput");
    const spinner = document.getElementById("loading-spinner");
    const sendButton = document.getElementById("sendButton");
    const micButton = document.getElementById("micButton");
    const musicSection = document.getElementById("musicSection");

    function appendMessage(sender, text) {
      const msgDiv = document.createElement("div");
      msgDiv.className = "message " + (sender === "user" ? "user-message" : "bot-message");
      msgDiv.innerHTML = `<span>${text}</span>`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage(message) {
      appendMessage("user", message);
      input.value = "";
      spinner.style.display = "flex";

      try {
        
      console.log("Sending to /send:", message);

      const response = await fetch("http://127.0.0.1:5000/send", { 

          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        console.log("Response status:", response.status);

        if (!response.ok) {
          throw new Error("Server error: " + response.statusText);
        }

        const data = await response.json();
        console.log("Bot response:", data);
        appendMessage("bot", data.response);

       } catch (error) {
        console.log("Sending message:", message);
        appendMessage("bot", "Sorry, something went wrong.");
      }

      finally {
        spinner.style.display = "none";
      }

        if (data.response.includes("Here’s a calming playlist")) {
          musicSection.innerHTML = `
            <iframe src="https://open.spotify.com/embed/playlist/5LWAFfebSzZT7XzaOmN2lX?utm_source=generator"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy"></iframe>`;
        }
      
    }

    sendButton.addEventListener("click", () => {
      const userMessage = input.value.trim();
      if (userMessage !== "") {
        sendMessage(userMessage);
      }
    });

    input.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        const userMessage = input.value.trim();
        if (userMessage !== "") {
          sendMessage(userMessage);
        }
      }
    });

    // Speech recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onresult = function (event) {
        const transcript = event.results[0][0].transcript;
        input.value = transcript;
        sendMessage(transcript);
      };

      recognition.onerror = function (event) {
        alert("Speech recognition error: " + event.error);
      };

      micButton.addEventListener("click", () => {
        recognition.start();
      });
    } else {
      micButton.disabled = true;
      micButton.title = "Speech recognition not supported in this browser.";
    }

    // Auto scroll chat to latest
    chatBox.scrollTop = chatBox.scrollHeight;
  });
</script>

<!-- jQuery CDN (must be loaded first) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- <script src="{{ url_for('static', filename='chat.js') }}"></script>-->


</body>
</html>
