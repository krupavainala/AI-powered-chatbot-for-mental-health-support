<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f1f1;
            padding: 30px;
        }
        .chat-history-container {
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .message {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .message:last-child {
            border-bottom: none;
        }
        .role {
            font-weight: bold;
        }
        .timestamp {
            color: #999;
            font-size: 12px;
        }
        .delete-button {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            background: #ff5c5c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .delete-button:hover {
            background-color: #e60000;
        }
    </style>
</head>
<body>
    <div class="chat-history-container">
        <h2>Chat History for {{ username }}</h2>
        {% if messages %}
            {% for role, message, timestamp in messages %}
                <div class="message">
                    <div class="role">{{ role.capitalize() }}:</div>
                    <div class="text">{{ message }}</div>
                    <div class="timestamp">{{ timestamp }}</div>
                </div>
            {% endfor %}
        {% else %}
            <p>No chat history available.</p>
        {% endif %}
        <button class="delete-button" onclick="deleteChatHistory()">Delete Chat History</button>
    </div>

    <script>
        function deleteChatHistory() {
            if (confirm("Are you sure you want to delete your chat history?")) {
                fetch("/delete_chat_history", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "deleted") {
                        alert("Chat history deleted.");
                        window.location.reload();
                    } else {
                        alert("Error deleting chat history.");
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    alert("Error deleting chat history.");
                });
            }
        }
    </script>
</body>
</html>
